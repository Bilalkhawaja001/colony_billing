{% extends 'base.html' %}
{% block content %}
<div class='card'>
  <h5>Unit Master (Create / Edit / Delete)</h5>
  <div class='grid'>
    <div class='field'><label>Unit_ID*</label><input id='u_unit_id' class='form-control' placeholder='SBC-G-000'></div>
    <div class='field'><label>Colony Type</label><input id='u_colony_type' class='form-control'></div>
    <div class='field'><label>Block Floor</label><input id='u_block_name' class='form-control'></div>
    <div class='field'><label>Room No</label><input id='u_room_no' class='form-control'></div>
    <div class='field'><label>Active</label><select id='u_active' class='form-select'><option value='1'>Yes</option><option value='0'>No</option></select></div>
  </div>
  <div class='toolbar'>
    <button class='btn btn-primary' onclick="post('/units/upsert',{unit_id:v('u_unit_id'),colony_type:v('u_colony_type'),block_name:v('u_block_name'),room_no:v('u_room_no'),is_active:Number(v('u_active')||1)})">Create/Update</button>
    <button class='btn btn-outline-secondary' onclick="listUnits()">List</button>
    <button class='btn btn-outline-danger' onclick="delUnit()">Delete (soft)</button>
  </div>
  <pre id='out' class='mt-3'></pre>

  <div class='card mt-3 p-2'>
    <div class='grid'>
      <div class='field'><label>Search (any)</label><input id='uf_q' class='form-control' placeholder='Unit_ID / Colony / Block / Room' oninput='applyUnitFilters()'></div>
      <div class='field'><label>Colony Type</label><input id='uf_colony' class='form-control' oninput='applyUnitFilters()'></div>
      <div class='field'><label>Block/Floor</label><input id='uf_block' class='form-control' oninput='applyUnitFilters()'></div>
      <div class='field'><label>Room No</label><input id='uf_room' class='form-control' oninput='applyUnitFilters()'></div>
      <div class='field'><label>Active</label><select id='uf_active' class='form-select' onchange='applyUnitFilters()'><option value=''>All</option><option value='1'>Yes</option><option value='0'>No</option></select></div>
    </div>
  </div>

  <div id='unit_list' class='mt-3'></div>
</div>
<script>
let UNIT_ROWS=[];

function renderUnits(rows){
  const box=document.getElementById('unit_list');
  if(!rows||!rows.length){ box.innerHTML="<div class='text-muted small'>No units found.</div>"; return; }
  const cols=['unit_id','category_path','colony_type','block_name','room_no','is_active'];
  const head='<tr>'+cols.map(c=>`<th>${c==='unit_id'?'Unit_ID':(c==='category_path'?'Category':c)}</th>`).join('')+'</tr>';
  const body=rows.map(r=>{
    const categoryPath = [r.colony_type||'', r.block_name||'', r.room_no||''].filter(Boolean).join(' > ');
    const x = {...r, category_path: categoryPath};
    return '<tr>'+cols.map(c=>`<td>${x[c]??''}</td>`).join('')+'</tr>';
  }).join('');
  box.innerHTML=`<div class='table-responsive'><table class='table table-sm table-striped'><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}

function applyUnitFilters(){
  const q=(document.getElementById('uf_q').value||'').trim().toLowerCase();
  const colony=(document.getElementById('uf_colony').value||'').trim().toLowerCase();
  const block=(document.getElementById('uf_block').value||'').trim().toLowerCase();
  const room=(document.getElementById('uf_room').value||'').trim().toLowerCase();
  const active=(document.getElementById('uf_active').value||'').trim();

  const filtered = (UNIT_ROWS||[]).filter(r=>{
    const unit=(r.unit_id||'').toLowerCase();
    const col=(r.colony_type||'').toLowerCase();
    const blk=(r.block_name||'').toLowerCase();
    const rm=(r.room_no||'').toLowerCase();
    const cat=[col,blk,rm].filter(Boolean).join(' > ');
    const any=[unit,col,blk,rm,cat].join(' ');

    if(q && !any.includes(q)) return false;
    if(colony && !col.includes(colony)) return false;
    if(block && !blk.includes(block)) return false;
    if(room && !rm.includes(room)) return false;
    if(active!=='' && String(r.is_active??'')!==active) return false;
    return true;
  });

  document.getElementById('out').textContent=JSON.stringify({status:'ok', total:(UNIT_ROWS||[]).length, filtered:filtered.length},null,2);
  renderUnits(filtered);
}

async function listUnits(){
  const r=await fetch('/units?active_only=0');
  const j=await r.json();
  UNIT_ROWS = j.rows || [];
  applyUnitFilters();
}

function delUnit(){
  const id=v('u_unit_id');
  if(!id){document.getElementById('out').textContent='Unit_ID required';return;}
  fetch('/units/'+encodeURIComponent(id),{method:'DELETE'})
    .then(r=>r.json())
    .then(j=>{document.getElementById('out').textContent=JSON.stringify(j,null,2); listUnits();});
}

listUnits();
</script>
{% endblock %}

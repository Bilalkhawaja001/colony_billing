<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>Utility Billing Platform</title>
  <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'>
  <link href='/static/css/ui.css' rel='stylesheet'>
</head>
<body>
  <div class='app-shell'>
    <aside id='appSidebar' class='app-sidebar elev-1'>
      <div class='sidebar-header'>
        <div class='brand-logo' aria-label='Company Logo'>
          <img src='/static/img/liberty-mills-logo.png' alt='Liberty Mills Limited Logo' class='brand-logo-img'>
        </div>
        <div class='brand-title'>LIBERTY MILLS LIMITED</div>
        <div class='brand-sub'>NOORIABAD</div>
        <div class='brand-sub-2'>UTILITY BILLING SYSTEM</div>
      </div>

      <nav class='sidebar-nav'>
        <a class='side-link {% if request.path == "/ui/employee-helper" %}active{% endif %}' href='/ui/employee-helper'><span class='icon'>👤</span><span class='label'>Employee Helper</span></a>
        <a class='side-link {% if request.path == "/ui/employees" %}active{% endif %}' href='/ui/employees'><span class='icon'>🧾</span><span class='label'>Employees</span></a>
        <a class='side-link {% if request.path == "/ui/unit-master" %}active{% endif %}' href='/ui/unit-master'><span class='icon'>🏢</span><span class='label'>Unit Master</span></a>
        <a class='side-link {% if request.path == "/ui/meter-master" %}active{% endif %}' href='/ui/meter-master'><span class='icon'>🔌</span><span class='label'>Meter Master</span></a>
        <a class='side-link {% if request.path == "/ui/meter-register-ingest" %}active{% endif %}' href='/ui/meter-register-ingest'><span class='icon'>📥</span><span class='label'>Meter Register Ingest</span></a>
        <a class='side-link {% if request.path == "/ui/rooms" %}active{% endif %}' href='/ui/rooms'><span class='icon'>🗂️</span><span class='label'>Rooms Snapshot</span></a>
        <a class='side-link {% if request.path == "/ui/occupancy" %}active{% endif %}' href='/ui/occupancy'><span class='icon'>📊</span><span class='label'>Occupancy</span></a>
        <a class='side-link {% if request.path == "/ui/elec-summary" %}active{% endif %}' href='/ui/elec-summary'><span class='icon'>⚡</span><span class='label'>ELEC Summary</span></a>
        <a class='side-link {% if request.path == "/ui/billing" %}active{% endif %}' href='/ui/billing'><span class='icon'>💳</span><span class='label'>Billing</span></a>
        <a class='side-link {% if request.path == "/ui/reports" %}active{% endif %}' href='/ui/reports'><span class='icon'>📑</span><span class='label'>Reports</span></a>
        <a class='side-link {% if request.path == "/ui/monthly-setup" %}active{% endif %}' href='/ui/monthly-setup'><span class='icon'>🗓️</span><span class='label'>Monthly Rates Config</span></a>
      </nav>
    </aside>

    <main class='app-main'>
      <header class='topbar elev-1'>
        <div class='d-flex align-items-center gap-2'>
          <button id='sidebarToggle' class='btn btn-sm btn-ghost' type='button' aria-label='Toggle Sidebar'>☰</button>
          <h1 class='app-title'>Utility Billing Platform</h1>
        </div>
      </header>

      <section class='app-content'>
        {% block content %}{% endblock %}
      </section>
    </main>
  </div>

  <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js'></script>
  <script src='/static/js/ui.js'></script>
</body>
</html>

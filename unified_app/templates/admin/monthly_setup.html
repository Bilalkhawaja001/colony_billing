{% extends 'base.html' %}
{% block content %}
<div class="container-fluid py-3">
  <div class="card shadow-sm">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h5 class="mb-0">Monthly Rate Master</h5>
      <span class="text-muted small">Initialize + Configure rates month-wise</span>
    </div>
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Month Cycle (e.g. Feb-2026)</label>
          <input id="month_cycle" class="form-control" placeholder="Feb-2026" />
        </div>
        <div class="col-md-2">
          <label class="form-label">Admin User ID</label>
          <input id="actor_user_id" class="form-control" placeholder="1" value="{{ actor_user_id or '1' }}" />
        </div>
        <div class="col-md-3 d-flex align-items-end">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="seed_from_previous" checked>
            <label class="form-check-label" for="seed_from_previous">Seed from previous month</label>
          </div>
        </div>
        <div class="col-md-4 d-flex align-items-end gap-2">
          <button class="btn btn-primary" onclick="initializeMonth()">Initialize Month</button>
          <button class="btn btn-outline-secondary" onclick="loadConfig()">Load Config</button>
          <button class="btn btn-outline-dark" onclick="loadHistory()">History</button>
        </div>
      </div>

      <hr class="my-4" />

      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Electricity Rate</label>
          <input id="elec_rate" type="number" step="0.0001" class="form-control" value="0" />
        </div>
        <div class="col-md-3">
          <label class="form-label">Water General Rate</label>
          <input id="water_general_rate" type="number" step="0.0001" class="form-control" value="0" />
        </div>
        <div class="col-md-3">
          <label class="form-label">Water Drinking Rate</label>
          <input id="water_drinking_rate" type="number" step="0.0001" class="form-control" value="0" />
        </div>
        <div class="col-md-3">
          <label class="form-label">School Van Rate</label>
          <input id="school_van_rate" type="number" step="0.0001" class="form-control" value="0" />
        </div>
      </div>

      <div class="mt-3">
        <button class="btn btn-success" onclick="saveConfig()">Save Rates</button>
      </div>

      <pre id="status" class="bg-light border rounded p-2 mt-3 small mb-0">Ready.</pre>

      <div class="mt-4">
        <h6>Saved Monthly Rates</h6>
        <div class="table-responsive">
          <table class="table table-sm table-bordered" id="history_table">
            <thead>
              <tr>
                <th>Month</th>
                <th>ELEC</th>
                <th>Water General</th>
                <th>Water Drinking</th>
                <th>Van Rate</th>
                <th>Updated At</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function payloadBase() {
    return {
      month_cycle: document.getElementById('month_cycle').value.trim(),
      seed_from_previous: document.getElementById('seed_from_previous').checked,
      actor_user_id: document.getElementById('actor_user_id').value.trim()
    };
  }

  function setStatus(x) {
    document.getElementById('status').textContent = typeof x === 'string' ? x : JSON.stringify(x, null, 2);
  }

  async function initializeMonth() {
    const r = await fetch('/monthly-rates/initialize', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payloadBase())
    });
    const j = await r.json();
    setStatus(j);
    if (j.status === 'ok') await loadConfig();
  }

  async function loadConfig() {
    const month = document.getElementById('month_cycle').value.trim();
    if (!month) return setStatus('month_cycle is required');
    const r = await fetch('/monthly-rates/config?month_cycle=' + encodeURIComponent(month));
    const j = await r.json();
    setStatus(j);
    if (j.status === 'ok' && j.row) {
      document.getElementById('elec_rate').value = j.row.elec_rate ?? 0;
      document.getElementById('water_general_rate').value = j.row.water_general_rate ?? 0;
      document.getElementById('water_drinking_rate').value = j.row.water_drinking_rate ?? 0;
      document.getElementById('school_van_rate').value = j.row.school_van_rate ?? 0;
    }
  }

  async function saveConfig() {
    const d = {
      month_cycle: document.getElementById('month_cycle').value.trim(),
      actor_user_id: document.getElementById('actor_user_id').value.trim(),
      elec_rate: parseFloat(document.getElementById('elec_rate').value || '0'),
      water_general_rate: parseFloat(document.getElementById('water_general_rate').value || '0'),
      water_drinking_rate: parseFloat(document.getElementById('water_drinking_rate').value || '0'),
      school_van_rate: parseFloat(document.getElementById('school_van_rate').value || '0')
    };
    const r = await fetch('/monthly-rates/config/upsert', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(d)
    });
    const j = await r.json();
    setStatus(j);
    if (j.status === 'ok') loadHistory();
  }

  async function loadHistory() {
    const r = await fetch('/monthly-rates/history?limit=36');
    const j = await r.json();
    const tb = document.querySelector('#history_table tbody');
    tb.innerHTML = '';
    (j.rows || []).forEach(x => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${x.month_cycle ?? ''}</td>
        <td>${x.elec_rate ?? 0}</td>
        <td>${x.water_general_rate ?? 0}</td>
        <td>${x.water_drinking_rate ?? 0}</td>
        <td>${x.school_van_rate ?? 0}</td>
        <td>${x.updated_at ?? x.created_at ?? ''}</td>`;
      tb.appendChild(tr);
    });
  }

  loadHistory();
</script>
{% endblock %}

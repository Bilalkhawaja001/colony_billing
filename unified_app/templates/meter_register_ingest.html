{% extends 'base.html' %}{% block content %}<div class='card'><h5>Meter Register Ingest (Hardened Preview)</h5><div class='field'><label>CSV Content</label><textarea id='csv_text' class='form-control' rows='10' placeholder='Paste CSV here'></textarea></div><div class='toolbar'><button class='btn btn-primary' onclick='runIngest()'>Run Ingest Preview</button><button class='btn btn-outline-secondary' onclick='loadSample()'>Load Dummy Sample</button></div><pre id='out' class='mt-3'></pre><a id='errLink' href='#' target='_blank'></a></div><script>function loadSample(){document.getElementById('csv_text').value=`Month Cycle,Unit ID,Meter ID,Meter Type,Previous Reading,Current Reading\n2026-06,WE-001,M-1001,Electricity,100,150\nMonth Cycle,Unit ID,Meter ID,Meter Type,Previous Reading,Current Reading\n2026-06,,M-1002,Water,120,130\n2026-06,WE-002,M-1003,Water,200,190`;}async function runIngest(){const csv_text=document.getElementById('csv_text').value; const r=await fetch('/imports/meter-register/ingest-preview',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({csv_text})}); const t=await r.text(); document.getElementById('out').textContent=t; try{const j=JSON.parse(t); if(j.error_report_download){const a=document.getElementById('errLink'); a.href=j.error_report_download; a.textContent='Download Row-level Error Report';}}catch(e){}}</script>{% endblock %}
